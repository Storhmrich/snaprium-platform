<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags – Core for Google & SEO -->
    <title>Snaprium - Instant Step-by-Step Math & Science Solver</title>
    <meta name="description" content="Snap any math, physics, or chemistry problem and get clear, exam-ready step-by-step solutions in seconds. Master homework, ace exams, and study smarter with Snaprium – your ultimate problem solver.">
    
    <!-- Open Graph / Facebook, WhatsApp, LinkedIn Previews -->
    <meta property="og:title" content="Snaprium - Scan & Solve Math, Physics, Chemistry Instantly">
    <meta property="og:description" content="Turn homework struggles into instant understanding. Snap a photo of any question for detailed, step-by-step explanations in math, physics, and chemistry. Build confidence and get better grades fast.">
    <meta property="og:image" content="%PUBLIC_URL%/assets/images/snaprium-og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://snaprium.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Snaprium">
    
    <!-- Twitter/X Cards – Great for shares on X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Snaprium - Instant Math & Science Problem Solver">
    <meta name="twitter:description" content="Snap your question → get step-by-step solutions instantly. Perfect for students tackling math, physics, chemistry homework and exams.">
    <meta name="twitter:image" content="%PUBLIC_URL%/assets/images/snaprium-og-image.jpg">
    
    <!-- Favicon & App Icons (add these files to /public/) -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-32x32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    
    <!-- Theme & PWA Basics (optional but nice for mobile) -->
    <meta name="theme-color" content="#4f46e5" /> <!-- Adjust to your brand color -->
    <meta name="msapplication-TileColor" content="#4f46e5" />
    
    <!-- Preconnect to important domains if you use CDNs/fonts -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
    
    <!-- Noindex if still in dev – remove when live -->
    <!-- <meta name="robots" content="noindex, nofollow" /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
